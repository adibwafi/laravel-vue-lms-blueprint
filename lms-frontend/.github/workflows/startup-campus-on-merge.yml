name: On Pull Request Merged
on:
  pull_request:
    types:
      - closed
    branches:
      - 'main'
  workflow_dispatch: # Add this to enable manual triggering

jobs:
  Build:
    name: Build Production
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get commit hash
        id: get-commit-hash
        run: echo "::set-output name=commit-hash::$(git rev-parse --short HEAD)"

      - name: Replace .env content with variables
        run: |
          cd startup-campus # Change to the startup-campus directory
          # Create or update .env file with variables
          echo "VUE_APP_STORAGE_BASE_URL=${{ vars.VUE_APP_STORAGE_BASE_URL }}" > .env
          echo "VUE_APP_API_BASE_URL=${{ vars.VUE_APP_API_BASE_URL_PRODUCTION }}" >> .env
          rm .env.production
          cat .env

      - name: Build, tag, and push the image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.REPO_NAME }}
          IMAGE_TAG: ${{ steps.get-commit-hash.outputs.commit-hash }}
        run: |
          cd startup-campus # Change to the startup-campus directory
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest