name: Cypress E2E Tests

on:
  push:
    branches: [ main ] # Or any branch you want to trigger the tests on
  pull_request:
    types: [synchronize, opened]
    branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: startup-campus
          # Remove 'start' and 'wait-on' since we're not starting a local server
          browser: chrome
          # config: pageLoadTimeout=100000,baseUrl=${{ secrets.STAGING_URL }}
          env: CYPRESS_USER_EMAIL=${{ secrets.CYPRESS_USER_EMAIL }},CYPRESS_USER_PASSWORD=${{ secrets.CYPRESS_USER_PASSWORD }},baseCYPRESS_BASE_URLUrl=${{ secrets.STAGING_URL }}