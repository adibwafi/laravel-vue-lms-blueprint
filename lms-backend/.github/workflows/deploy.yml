name: Deploy

# =============================================================================
# CI/CD WORKFLOW — BLUEPRINT PLACEHOLDER
# =============================================================================
# This workflow has been sanitized for open-source release.
# Configure your own deployment secrets in GitHub repository Settings → Secrets.
#
# Required secrets:
#   - SERVER_HOST: Your server IP or hostname
#   - SERVER_USER: SSH username
#   - SSH_PRIVATE_KEY: Private key for SSH access
# =============================================================================

on:
  push:
    branches: [ "main" ]

jobs:
  laravel-deploy:
    name: 🚀 Laravel Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
        with:
          php-version: '8.1'

      - uses: actions/checkout@v3

      - name: Install dependencies
        run: composer install --optimize-autoloader --no-dev

      - name: Optimizing Configuration Loading
        run: php artisan config:cache

      - name: Optimizing Route Loading
        run: php artisan route:cache

      - name: Clear cache
        run: php artisan cache:clear

      - name: Clear optimize
        run: php artisan optimize:clear

